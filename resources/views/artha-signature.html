<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artha — Signature</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Beau+Rivage&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f4ecd8;
    --paper-edge: #e9dfc4;
    --ink: #1c2541;
    --ink-soft: #33436e;
    --tape: rgba(233, 201, 145, 0.55);
    --tape-edge: rgba(233, 201, 145, 0.85);
    --stamp: #a13d2b;
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at top, #2a2f3d 0%, #14161d 60%, #0c0d12 100%);
    font-family: 'JetBrains Mono', monospace;
    padding: 40px;
  }

  .tag{
    position: relative;
    width: min(88vw, 480px);
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,0.35), transparent 40%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 3px);
    border-radius: 3px;
    padding: 56px 28px 40px;
    transform: rotate(-2.2deg);
    box-shadow:
      0 2px 0 var(--paper-edge),
      0 18px 40px -12px rgba(0,0,0,0.55),
      0 4px 10px -2px rgba(0,0,0,0.35);
  }

  /* deckled / torn paper edge, subtle */
  .tag::before{
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 3px;
    box-shadow: inset 0 0 0 1px rgba(28,37,65,0.06);
    pointer-events: none;
  }

  .tape{
    position: absolute;
    top: -18px;
    left: 32px;
    width: 92px;
    height: 34px;
    background: var(--tape);
    border: 1px solid var(--tape-edge);
    transform: rotate(-6deg);
    box-shadow: 0 3px 6px rgba(0,0,0,0.25);
    opacity: 0.9;
  }

  .caption{
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.65;
    margin-bottom: 6px;
  }

  .sig-wrap{
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
  }

  svg.signature{
    width: 100%;
    height: auto;
    max-width: 420px;
    overflow: visible;
  }

  .stroke-layer{
    font-family: 'Beau Rivage', cursive;
    font-size: 112px;
    text-anchor: middle;
    fill: var(--ink);
  }

  .stroke-layer.ghost{
    fill: var(--ink-soft);
    opacity: 0.16;
    transform: translate(1.6px, 2.4px) rotate(0.4deg);
  }

  .reveal{
    clip-path: inset(0 100% 0 0);
    animation: write 1.6s cubic-bezier(0.65, 0, 0.35, 1) 0.3s forwards;
  }

  .flourish{
    fill: none;
    stroke: var(--ink);
    stroke-width: 3.4;
    stroke-linecap: round;
    stroke-dasharray: 420;
    stroke-dashoffset: 420;
    animation: draw 0.9s ease-out 1.85s forwards;
  }

  .nib{
    fill: var(--ink);
    opacity: 0;
    filter: drop-shadow(0 0 2px rgba(28,37,65,0.5));
    offset-path: path("M60 144 C 160 124, 300 172, 400 140");
    animation: pen-travel 0.9s linear 1.85s forwards;
  }

  .under-label{
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0;
    margin-top: 4px;
    animation: fade-in 0.6s ease-out 2.6s forwards;
  }

  .stamp{
    position: absolute;
    bottom: 18px;
    right: 22px;
    width: 46px;
    height: 46px;
    border: 1.5px solid var(--stamp);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--stamp);
    font-size: 8px;
    letter-spacing: 0.05em;
    text-align: center;
    opacity: 0;
    transform: rotate(-14deg) scale(1.4);
    animation: stamp-in 0.35s ease-out 2.75s forwards;
  }

  @keyframes write{
    to{ clip-path: inset(0 0% 0 0); }
  }
  @keyframes draw{
    to{ stroke-dashoffset: 0; }
  }
  @keyframes pen-travel{
    0%{ opacity: 1; offset-distance: 0%; }
    92%{ opacity: 1; }
    100%{ opacity: 0; offset-distance: 100%; }
  }
  @keyframes fade-in{
    to{ opacity: 0.7; }
  }
  @keyframes stamp-in{
    to{ opacity: 0.85; transform: rotate(-14deg) scale(1); }
  }

  @media (prefers-reduced-motion: reduce){
    .reveal{ clip-path: inset(0 0% 0 0); animation: none; }
    .flourish{ stroke-dashoffset: 0; animation: none; }
    .nib{ display: none; }
    .under-label{ opacity: 0.7; animation: none; }
    .stamp{ opacity: 0.85; transform: rotate(-14deg) scale(1); animation: none; }
  }
</style>
</head>
<body>

  <div class="tag">
    <div class="tape"></div>
    <div class="caption">signed &nbsp;·&nbsp; software engineer</div>

    <div class="sig-wrap">
      <svg class="signature" viewBox="0 0 460 180" xmlns="http://www.w3.org/2000/svg">
        <!-- soft ink-bleed ghost layer for hand-drawn depth -->
        <text x="231.6" y="122.4" class="stroke-layer ghost">Artha</text>

        <!-- main signature, reveals left-to-right like it's being written -->
        <g class="reveal">
          <text x="230" y="120" class="stroke-layer">Artha</text>
        </g>

        <!-- flourish swash underline, draws itself after the word finishes -->
        <path class="flourish" d="M60 144 C 160 124, 300 172, 400 140" />

        <!-- traveling pen nib along the flourish -->
        <circle class="nib" r="3.2" cx="0" cy="0" />
      </svg>
    </div>

    <div class="under-label">portfolio &nbsp;—&nbsp; 2026</div>
    <div class="stamp">EST<br>2026</div>
  </div>

</body>
</html>
